query ExecuteSavedSearchQuery($id: ID!, $cursor: String, $limit: Int = 20) {
    executeSavedSearch(id: $id, cursor: $cursor, limit: $limit) {
        ... on ContentList {
            __typename
            data {
                ...ContentFields
            }
            pagination {
                cursor
                hasMore
                limit
            }
        }
        ... on AssetList {
            __typename
            data {
                ...AssetFields
            }
            pagination {
                cursor
                hasMore
                limit
            }
        }
    }
}
