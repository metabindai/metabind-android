fragment ResolvedPackageDataFields on ResolvedPackageData {
   id
   version
   components
   assets
}

fragment ContentFields on Content {
  id
  typeId
  packageVersion
  name
  content
  compiled
  tags
  locale
  createdAt
  updatedAt
  lastPublishedVersion
  resolvedRef {
    ...ResolvedPackageRefFields
  }
}

fragment ResolvedPackageRefFields on ResolvedPackageRef {
  package
  dependencies
}

fragment ComponentFields on Component {
  id
  name
  title
  content
  compiled
  createdAt
  updatedAt
}

fragment ComponentPreviewFields on ComponentPreview {
  componentId
  componentName
  component {
    ...ComponentFields
  }
  resolvedRef {
    ...ResolvedPackageRefFields
  }
}

fragment ContentPreviewFields on ContentPreview {
  contentId
  contentName
  contentTypeName
  content {
    ...ContentFields
  }
  resolvedRef {
    ...ResolvedPackageRefFields
  }
}

fragment PreviewResultFields on PreviewResult {
  ... on ComponentPreview {
    ...ComponentPreviewFields
  }
  ... on ContentPreview {
    ...ContentPreviewFields
  }
}

fragment ContentTypeFields on ContentType {
  id
  name
  packageVersion
  schema
  updatedAt
}

fragment AssetFields on Asset {
  id
  name
  type
  url
  size
  width
  height
  tags
  updatedAt
}

fragment TagFields on Tag {
  id
  name
  slug
}

fragment SavedSearchFields on SavedSearch {
  id
  name
  type
}

fragment PackageDependencyFields on PackageDependency {
  projectId
  version
}

fragment PackageFields on Package {
  id
  version
  components {
    ...ComponentFields
  }
  assets {
    ...AssetFields
  }
  dependencies {
    ...PackageDependencyFields
  }
  compiled
  resolvedRef {
    ...ResolvedPackageRefFields
  }
}
